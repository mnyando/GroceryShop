<header class="nav">
  <div class="container nav__inner">
    <!-- Brand Logo -->
    <a class="nav__brand" href="{{ url_for('main.index') }}" id="nav-logo">
      Mama&nbsp;Mboga
    </a>
    
    <!-- Primary Navigation Links -->
    <nav class="nav__links" id="navbarContent" aria-label="Primary">
      <a href="{{ url_for('main.index') }}" id="nav-link-home">Home</a>
      <a href="{{ url_for('main.shop') }}" id="nav-link-shop">Shop</a>
      <a href="{{ url_for('main.about') }}" id="nav-link-about">About</a>
      {% if current_user.is_authenticated and current_user.is_admin %}
        <a href="{{ url_for('main.admin_dashboard') }}" id="nav-link-admin" style="font-weight: 600;">Admin Panel</a>
      {% endif %}
    </nav>
    
    <!-- Actions and Cart -->
    <div class="nav__actions">
      {% if current_user.is_authenticated %}
        <a href="{{ url_for('main.user_profile', uname=current_user.username) }}" class="nav__auth-btn" id="nav-user-greeting" style="font-weight: 600; text-decoration: none;">
          Hello, {{ current_user.firstname }}
        </a>
        <a href="{{ url_for('auth.logout') }}" class="nav__auth-btn nav__auth-btn--primary" id="nav-link-signout">Sign Out</a>
      {% else %}
        <a href="{{ url_for('auth.login') }}" class="nav__auth-btn" id="nav-link-signin">Sign In</a>
        <a href="{{ url_for('auth.register') }}" class="nav__auth-btn nav__auth-btn--primary" id="nav-link-signup">Register</a>
      {% endif %}
      
      <!-- Cart Drawer Trigger -->
      <button class="nav__cart" data-cart-open aria-label="Open cart" id="nav-cart-btn">
        Cart <span class="nav__cart-count" id="cart-badge-count" data-cart-count>0</span>
      </button>
    </div>
    
    <!-- Mobile Menu Toggle -->
    <button class="nav__toggle" aria-label="Toggle navigation" aria-expanded="false" id="nav-toggle-btn">
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>
</header>
